<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{PROJECT_NAME}} — Short-Form Vertical</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    [data-composition-id="main"] {
      position: relative;
      width: 1080px;
      height: 1920px;
      background: #07121c;
      overflow: hidden;
    }

    /* Face grading */
    #face-video {
      filter: contrast(1.08) saturate(1.08) brightness(0.97);
    }

    #face-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(7,18,28,0.6) 0%, transparent 15%, transparent 85%, rgba(7,18,28,0.6) 100%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div data-composition-id="main" data-start="0" data-width="1080" data-height="1920">

    <!-- Track 3: Ambient background (full duration) -->
    <div id="ambient-bg"
         data-composition-id="ambient-bg"
         data-composition-src="compositions/ambient-bg.html"
         data-start="0"
         data-duration="{{TOTAL_DURATION}}"
         data-track-index="3"></div>

    <!-- Track 0: Face video -->
    <div id="face-wrapper" class="clip"
         data-start="0"
         data-duration="{{TOTAL_DURATION}}"
         data-track-index="0"
         style="position: absolute; width: 1920px; height: 1080px;">
      <video id="face-video"
             src="assets/face-edit.mp4"
             muted
             playsinline
             data-start="0"
             data-duration="{{TOTAL_DURATION}}"
             data-track-index="0"></video>
    </div>

    <!-- Track 0b: Face audio (separate) -->
    <audio id="face-audio"
           src="assets/face-edit.mp4"
           data-start="0"
           data-duration="{{TOTAL_DURATION}}"
           data-track-index="0"
           data-volume="1"></audio>

    <!-- Track 5: Seam treatment -->
    <div id="seam-treatment"
         data-composition-id="seam-treatment"
         data-composition-src="compositions/seam-treatment.html"
         data-start="0"
         data-duration="{{TOTAL_DURATION}}"
         data-track-index="5"></div>

    <!-- Track 1: Scene overlays (add your scenes) -->
    <!-- Example:
    <div id="scene1"
         data-composition-id="scene1-intro"
         data-composition-src="compositions/scene1-intro.html"
         data-start="0"
         data-duration="{{SCENE1_DURATION}}"
         data-track-index="1"></div>
    -->

    <!-- Track 2: Captions -->
    <!-- Example:
    <div id="captions"
         data-composition-id="captions"
         data-composition-src="compositions/captions.html"
         data-start="0"
         data-duration="{{TOTAL_DURATION}}"
         data-track-index="2"></div>
    -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        var SLOT_DURATION = {{TOTAL_DURATION}};

        // Face-mode choreography
        // BOTTOM = bottom-half, visible landscape face
        // FULLSCREEN = cropped-cover, fills portrait frame
        // HIDDEN = same geometry as BOTTOM, just invisible
        var BOTTOM     = { x: -180, y: 1110, scale: 0.75 };
        var FULLSCREEN  = { x: -1166.5, y: 0, scale: 1.7778 };
        var HIDDEN      = Object.assign({}, BOTTOM, { opacity: 0 });
        var MODE_DUR = 0.32;

        // Set initial face position
        gsap.set('#face-wrapper', { ...BOTTOM, transformOrigin: '0 0' });

        var tl = gsap.timeline({ paused: true });

        // Face-mode transitions — uncomment and adjust for your scenes
        // var faceModes = [
        //   { t: SCENE2_START, mode: FULLSCREEN },
        //   { t: SCENE3_START, mode: BOTTOM },
        // ];
        // faceModes.forEach(function(entry) {
        //   tl.to('#face-wrapper', {
        //     ...entry.mode,
        //     duration: MODE_DUR,
        //     ease: 'expo.inOut'
        //   }, entry.t - 0.15);
        // });

        // Ken Burns slow zoom on face
        tl.to('#face-video', {
          scale: 1.025,
          duration: SLOT_DURATION,
          ease: 'none'
        }, 0);

        // Duration anchor — Law 11
        tl.to({}, { duration: SLOT_DURATION }, 0);

        window.__timelines = window.__timelines || {};
        window.__timelines['main'] = tl;
      })();
    </script>
  </div>
</body>
</html>
