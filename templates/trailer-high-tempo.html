<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>TRAILER — High-Tempo Video Edit</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #000; }

    [data-composition-id="main"] {
      position: relative; width: 1920px; height: 1080px;
      background: #000; overflow: hidden;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; color: #fff;
    }

    /* Video clips — direct children of root (NOT nested in timed divs) */
    .vid {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px; object-fit: cover;
    }

    /* Overlay layers */
    .overlay { position: absolute; inset: 0; pointer-events: none; }

    /* Vignette variants — pick one per scene */
    .vignette { background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%); }
    .vignette-heavy { background: radial-gradient(ellipse at center, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.95) 100%); }
    .vignette-light { background: radial-gradient(ellipse at 50% 40%, transparent 40%, rgba(0,0,0,0.5) 100%); }
    .vignette-dark { background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.8) 100%); }

    /* Texture overlays (Law 10: unifying texture) */
    .grain {
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }
    .burn-overlay { background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(212,160,74,0.12) 50%, rgba(0,0,0,0) 100%); }
    .flash-overlay { background: #fff; }

    /* Perspective grid floor (Law 10: unifying texture) */
    .grid-floor {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 1920px; height: 300px;
      background:
        linear-gradient(90deg, rgba(212,160,74,0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(212,160,74,0.08) 1px, transparent 1px);
      background-size: 80px 40px; background-position: center bottom;
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
      mask-image: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Crosshair mark (Law 10: unifying texture) */
    .crosshair {
      position: absolute; top: 40px; right: 40px;
      width: 60px; height: 60px;
      border: 2px solid rgba(212,160,74,0.3); border-radius: 50%;
    }
    .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(212,160,74,0.3); }
    .crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; transform: translateY(-50%); }
    .crosshair::after { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-50%); }

    /* Title / kinetic text */
    .title-hero {
      position: absolute; top: 50%; left: 50%;
      font-size: 160px; font-weight: 900; letter-spacing: -4px;
      line-height: 1; text-transform: uppercase; text-align: center; white-space: nowrap;
      color: #fff; text-shadow: 0 0 60px rgba(212,160,74,0.4), 0 4px 20px rgba(0,0,0,0.8);
    }
    /* GSAP will handle centering — use xPercent/yPercent instead of CSS transform */
    .title-hero .accent { color: #d4a04a; }

    .kinetic-text {
      position: absolute;
      font-size: 80px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 2px; line-height: 1;
      text-shadow: 0 0 40px rgba(196,30,58,0.4), 0 2px 10px rgba(0,0,0,0.9);
    }

    .accent-line {
      position: absolute; height: 3px;
      background: linear-gradient(90deg, transparent, #d4a04a, transparent);
    }

    .final-card { position: absolute; text-align: center; }
    .final-card h1 {
      font-size: 140px; font-weight: 900; letter-spacing: -2px;
      line-height: 1; text-transform: uppercase;
      text-shadow: 0 0 80px rgba(212,160,74,0.3);
    }
    .final-card .tagline {
      font-size: 24px; font-weight: 300; letter-spacing: 16px;
      text-transform: uppercase; color: #d4a04a; margin-top: 20px;
    }
    .final-card .date-tag {
      font-size: 18px; font-weight: 400; letter-spacing: 8px;
      color: rgba(255,255,255,0.5); margin-top: 30px;
    }
  </style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="30" data-width="1920" data-height="1080">

    <!-- ═══ SCENE N: Video + Overlays + Kinetic Text ═══ -->
    <!--
      Pattern per scene:
      1. <video> as direct child of root (NOT inside wrapper div)
      2. Vignette overlay (pick variant: vignette, vignette-heavy, vignette-light, vignette-dark)
      3. Optional: grid-floor, grain, crosshair, burn-overlay (Law 10)
      4. Kinetic text (verbs from beat-direction.md)
      5. Accent line for emphasis

      Flash transitions between scenes:
      <div id="flash-N" class="overlay clip flash-overlay" data-start="X.95" data-duration="0.12" data-track-index="10"></div>
      In GSAP: tl.fromTo('#flash-N', {opacity: 0.9}, {opacity: 0, duration: 0.12, ease: 'power2.in'}, X.95);
               tl.set('#flash-N', {opacity: 0}, X+0.1); // hard-kill
    -->

    <!-- ADD SCENES HERE following the pattern above -->

  </div>

  <script>
    (function() {
      var SLOT_DURATION = 30; // ← change to match data-duration
      var tl = gsap.timeline({ paused: true });

      // ── SCENE ENTRANCES (gsap.from — animate FROM invisible TO CSS position) ──
      // tl.from('#sN-text', { x: -200, opacity: 0, duration: 0.35, ease: 'power3.out' }, START_TIME);

      // ── FLASH TRANSITIONS (fromTo + hard-kill) ──
      // tl.fromTo('#flash-N', { opacity: 0.9 }, { opacity: 0, duration: 0.12, ease: 'power2.in' }, FLASH_START);
      // tl.set('#flash-N', { opacity: 0 }, FLASH_END);

      // ── FINAL SCENE FADE OUT (Law 9 exception — ONLY on last scene) ──
      // tl.to('#last-card', { opacity: 0, duration: 1, ease: 'power2.in' }, SLOT_DURATION - 1);

      // ── Duration anchor — Law 11 (NON-NEGOTIABLE) ──
      tl.to({}, { duration: SLOT_DURATION }, 0);

      window.__timelines = window.__timelines || {};
      window.__timelines['main'] = tl;
    })();
  </script>
</body>
</html>
